# ============================================================================
# Play fixtures for money-saver.
# Each fixture feeds a fake SQL result row through min_sample + the compute
# pipeline and asserts the resulting vars. Expected values are hand-computed
# from play.yaml — see docs/play-manifest-spec.md §8.
# ============================================================================

fixtures:
  # ---- Tier 1: 电动车传教士 (m4, catch-all) ----
  - name: ev-evangelist
    window_days: 30
    row:
      total_drives: 80
      total_charges: 40
      total_kwh: 1500
      total_km: 8000
    expect:
      # gas_cost = ROUND(8000*68/100) = ROUND(5440) = 5440
      gas_cost: 5440
      # elec_cost = ROUND(1500*6/10) = ROUND(900) = 900
      elec_cost: 900
      # money_saved = GREATEST(5440-900, 0) = 4540
      money_saved: 4540
      # money_score = LEAST(100, ROUND(4540/50)) = LEAST(100, 91) = 91
      money_score: 91
      money_band: m4
      persona.name: "电动车传教士"
      persona.tag: "#油车朋友已被你拉黑"
      # milk_tea_cups = ROUND(4540/15) = ROUND(302.67) = 303
      milk_tea_cups: 303
      # gas_tanks = ROUND(4540/400) = ROUND(11.35) = 11
      gas_tanks: 11
      # movie_tickets = ROUND(4540/50) = ROUND(90.8) = 91
      movie_tickets: 91
      # cost_per_km = ROUND(900*100/8000) = ROUND(11.25) = 11
      cost_per_km: 11
      total_kwh_r: 1500
      total_km_r: 8000

  # ---- Tier 2: 省钱达人 (m3, lt:70) ----
  - name: money-master
    window_days: 30
    row:
      total_drives: 50
      total_charges: 25
      total_kwh: 1500
      total_km: 5000
    expect:
      # gas_cost = ROUND(5000*68/100) = ROUND(3400) = 3400
      gas_cost: 3400
      # elec_cost = ROUND(1500*6/10) = ROUND(900) = 900
      elec_cost: 900
      # money_saved = 3400 - 900 = 2500
      money_saved: 2500
      # money_score = ROUND(2500/50) = 50 → m3 (lt:70, ≥40)
      money_score: 50
      money_band: m3
      persona.name: "省钱达人"
      persona.tag: "#电费单从不心疼"
      # milk_tea_cups = ROUND(2500/15) = ROUND(166.67) = 167
      milk_tea_cups: 167
      # gas_tanks = ROUND(2500/400) = ROUND(6.25) = 6
      gas_tanks: 6
      # movie_tickets = ROUND(2500/50) = ROUND(50) = 50
      movie_tickets: 50
      # cost_per_km = ROUND(900*100/5000) = ROUND(18) = 18
      cost_per_km: 18
      total_kwh_r: 1500
      total_km_r: 5000

  # ---- Tier 3: 省钱新手 (m2, lt:40) ----
  - name: saver-rookie
    window_days: 30
    row:
      total_drives: 25
      total_charges: 8
      total_kwh: 200
      total_km: 2000
    expect:
      # gas_cost = ROUND(2000*68/100) = ROUND(1360) = 1360
      gas_cost: 1360
      # elec_cost = ROUND(200*6/10) = ROUND(120) = 120
      elec_cost: 120
      # money_saved = 1360 - 120 = 1240
      money_saved: 1240
      # money_score = ROUND(1240/50) = ROUND(24.8) = 25 → m2 (lt:40, ≥15)
      money_score: 25
      money_band: m2
      persona.name: "省钱新手"
      persona.tag: "#省出来的都是赚的"
      # milk_tea_cups = ROUND(1240/15) = ROUND(82.67) = 83
      milk_tea_cups: 83
      # gas_tanks = ROUND(1240/400) = ROUND(3.1) = 3
      gas_tanks: 3
      # movie_tickets = ROUND(1240/50) = ROUND(24.8) = 25
      movie_tickets: 25
      # cost_per_km = ROUND(120*100/2000) = ROUND(6) = 6
      cost_per_km: 6
      total_kwh_r: 200
      total_km_r: 2000

  # ---- Tier 4: 电费观察员 (m1, lt:15) ----
  - name: bill-watcher
    window_days: 30
    row:
      total_drives: 10
      total_charges: 5
      total_kwh: 100
      total_km: 200
    expect:
      # gas_cost = ROUND(200*68/100) = ROUND(136) = 136
      gas_cost: 136
      # elec_cost = ROUND(100*6/10) = ROUND(60) = 60
      elec_cost: 60
      # money_saved = 136 - 60 = 76
      money_saved: 76
      # money_score = ROUND(76/50) = ROUND(1.52) = 2 → m1 (lt:15)
      money_score: 2
      money_band: m1
      persona.name: "电费观察员"
      persona.tag: "#充电比加油爽多了"
      # milk_tea_cups = ROUND(76/15) = ROUND(5.07) = 5
      milk_tea_cups: 5
      # gas_tanks = ROUND(76/400) = ROUND(0.19) = 0
      gas_tanks: 0
      # movie_tickets = ROUND(76/50) = ROUND(1.52) = 2
      movie_tickets: 2
      # cost_per_km = ROUND(60*100/200) = ROUND(30) = 30
      cost_per_km: 30
      total_kwh_r: 100
      total_km_r: 200

  # ---- Unscored: 低于 min_sample ----
  - name: too-few-drives
    row:
      total_drives: 3
      total_charges: 2
      total_kwh: 50
      total_km: 100
    expect_unscored: true   # total_drives 3 < min_sample.min 5
