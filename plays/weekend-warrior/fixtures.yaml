# ============================================================================
# weekend-warrior fixtures — CI（PlayRegistryTest）
# 用 mock SQL 行验证 compute 流水线可执行 + 档位/查表/摘要全对。
#
# warrior_score = ROUND(wknd_km_pct * 6/10 + wknd_trip_pct * 4/10)
# 档位：<20=commuter / <40=light_commuter / <60=balanced / <80=weekend_leaner / ≥80=warrior
# ============================================================================

fixtures:
  # 极端周末战士：周末里程完全碾压工作日
  # wknd_km_pct = ROUND(2400*100 / GREATEST(2560, 1)) = ROUND(93.75) = 94
  # wknd_trip_pct = ROUND(14*100 / GREATEST(20, 1)) = 70
  # warrior_score = ROUND(94*6/10 + 70*4/10) = ROUND(56.4+28.0) = ROUND(84.4) = 84 >= 80 → warrior
  - name: extreme-weekend-warrior
    window_days: 30
    row:
      total_trips: 20
      wknd_trips: 14
      wknd_km: 2400.0
      wkday_trips: 6
      wkday_km: 160.0
    expect:
      wknd_km_r: 2400
      wkday_km_r: 160
      wknd_km_pct: 94
      wkday_km_pct: 6
      wknd_trip_pct: 70
      warrior_score: 84
      wknd_avg_km: 171
      wkday_avg_km: 27
      identity: "warrior"
      persona.name: "周末战士"
      persona.tag: "#超充排队是周末标配"
      summary: "近 30 天：周末 14 次出行 2400 km，工作日 6 次 160 km。战士分 84/100，周末战士。"

  # 均衡型：里程和次数都大约五五开
  # wknd_km_pct = ROUND(720*100 / GREATEST(1600, 1)) = ROUND(45.0) = 45
  # wkday_km_pct = 100 - 45 = 55
  # wknd_trip_pct = ROUND(14*100 / GREATEST(35, 1)) = ROUND(40.0) = 40
  # warrior_score = ROUND(45*6/10 + 40*4/10) = ROUND(27+16) = 43 → balanced
  - name: balanced-driver
    window_days: 30
    row:
      total_trips: 35
      wknd_trips: 14
      wknd_km: 720.0
      wkday_trips: 21
      wkday_km: 880.0
    expect:
      wknd_km_r: 720
      wkday_km_r: 880
      wknd_km_pct: 45
      wkday_km_pct: 55
      wknd_trip_pct: 40
      warrior_score: 43
      wknd_avg_km: 51
      wkday_avg_km: 42
      identity: "balanced"
      persona.name: "七天全勤打工人"
      persona.tag: "#车轮是我的第五肢"
      summary: "近 30 天：周末 14 次出行 720 km，工作日 21 次 880 km。战士分 43/100，七天全勤打工人。"

  # 典型通勤奴隶：周末几乎不开
  # wknd_km_pct = ROUND(80*100 / GREATEST(880+80, 1)) = ROUND(8000/960) = ROUND(8.33) = 8
  # wkday_km_pct = 92
  # wknd_trip_pct = ROUND(4*100 / GREATEST(34, 1)) = ROUND(11.76) = 12
  # warrior_score = ROUND(8*6/10 + 12*4/10) = ROUND(4.8+4.8) = ROUND(9.6) = 10 < 20 → commuter
  - name: pure-commuter
    window_days: 30
    row:
      total_trips: 34
      wknd_trips: 4
      wknd_km: 80.0
      wkday_trips: 30
      wkday_km: 880.0
    expect:
      wknd_km_r: 80
      wkday_km_r: 880
      wknd_km_pct: 8
      wkday_km_pct: 92
      wknd_trip_pct: 12
      warrior_score: 10
      identity: "commuter"
      persona.name: "通勤奴隶"
      persona.tag: "#周末车位不给充满电"

  # 数据不足：total_trips < min_sample 6 → unscored
  - name: insufficient-trips
    row:
      total_trips: 3
      wknd_trips: 2
      wknd_km: 45.0
      wkday_trips: 1
      wkday_km: 12.0
    expect_unscored: true
