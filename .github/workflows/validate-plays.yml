name: Validate plays

# The CI gate behind "PRs without fixtures are rejected" (AGENTS.md) and
# "fixtures.yaml drives CI" (README). Two layers:
#
#   1. JSON Schema   — every plays/*/play.yaml validates against
#                      plays/play.schema.json (draft 2020-12, ajv)
#   2. Engine mirror — tools/validate_plays.py re-implements the production
#                      engine's load-time gates (SQL guard, compute rules,
#                      card template lint) and executes every fixtures.yaml
#                      case through the compute pipeline, asserting expects.
#
# A play that passes here loads and computes identically on the hosted engine.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: JSON Schema validation (ajv, draft 2020-12)
        run: |
          status=0
          for f in plays/*/play.yaml; do
            python3 -c 'import sys, json, yaml; json.dump(yaml.safe_load(open(sys.argv[1], encoding="utf-8")), open(sys.argv[2], "w"))' "$f" /tmp/play.json
            if npx --yes ajv-cli@5 validate --spec=draft2020 -s plays/play.schema.json -d /tmp/play.json; then
              echo "[PASS] schema: $f"
            else
              echo "[FAIL] schema: $f"
              status=1
            fi
          done
          exit $status

      - name: Engine-mirror validation + fixtures
        run: python3 tools/validate_plays.py

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Java PlayRegistryTest (engine-level fixture runner)
        run: cd bridge && mvn -q test -Dtest=PlayRegistryTest,PlayEngineTest -pl . --no-transfer-progress
