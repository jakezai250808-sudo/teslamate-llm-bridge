name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# read-only 仓库权限下必须显式声明（默认宽松可省略，留着更稳）
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 内置 token 足够，无需 PAT
        with:
          path-to-document: 'https://github.com/jakezai250808-sudo/teslamate-llm-bridge/blob/main/CLA.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'main'
          allowlist: dependabot[bot],bot*,*[bot]
